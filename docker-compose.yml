services:
  backend:
    build:
      context: ./backend
    container_name: scalpstation-backend
    env_file:
      - ./.env
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: scalpstation-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_WS_URL: ${NEXT_PUBLIC_BACKEND_WS_URL:-ws://localhost:3001/ws}
    ports:
      - "3000:3000"
    restart: unless-stopped
