apply plugin: 'com.android.application'

import java.net.URI
import java.util.Properties
import java.util.Locale

def rootEnv = new Properties()
def rootEnvFile = rootProject.file('../../.env')
if (rootEnvFile.exists()) {
    rootEnvFile.withInputStream { stream ->
        rootEnv.load(stream)
    }
}

def readConfig = { String key, String fallback = '' ->
    def envValue = System.getenv(key)
    if (envValue != null && !envValue.toString().trim().isEmpty()) {
        return envValue.toString().trim()
    }

    def propertyValue = rootEnv.getProperty(key)
    if (propertyValue != null && !propertyValue.toString().trim().isEmpty()) {
        return propertyValue.toString().trim()
    }

    return fallback
}

def asBoolean = { String value, boolean fallback = false ->
    if (value == null || value.trim().isEmpty()) {
        return fallback
    }

    return ['1', 'true', 'yes', 'on'].contains(value.trim().toLowerCase(Locale.US))
}

def quote = { String value ->
    return '"' + (value ?: '').replace('\\', '\\\\').replace('"', '\\"') + '"'
}

def defaultAppRedirectUri = 'com.troesh.scalpstation://auth/callback'
def defaultAppRedirectScheme = new URI(defaultAppRedirectUri).scheme
def configuredRedirectUri = readConfig('ANDROID_AUTH_REDIRECT_URI', defaultAppRedirectUri)
def parsedRedirectUri = new URI(configuredRedirectUri)
def usesHttpsRedirect = 'https'.equalsIgnoreCase(parsedRedirectUri.scheme ?: '')
def appLinkHost = usesHttpsRedirect ? (parsedRedirectUri.host ?: 'auth.invalid') : 'auth.invalid'
def appLinkPath = usesHttpsRedirect ? (parsedRedirectUri.path ?: '/auth/callback') : '/auth/callback'

def firebaseApiKey = readConfig('ANDROID_FIREBASE_API_KEY', '')
def firebaseAppId = readConfig('ANDROID_FIREBASE_APP_ID', '')
def firebaseProjectId = readConfig('ANDROID_FIREBASE_PROJECT_ID', '')
def firebaseSenderId = readConfig('ANDROID_FIREBASE_MESSAGING_SENDER_ID', '')
def firebaseStorageBucket = readConfig('ANDROID_FIREBASE_STORAGE_BUCKET', '')
def googleWebClientId = readConfig('ANDROID_FIREBASE_WEB_CLIENT_ID', '')
def facebookAppId = readConfig('ANDROID_FACEBOOK_APP_ID', '')
def facebookClientToken = readConfig('ANDROID_FACEBOOK_CLIENT_TOKEN', '')
def authBrokerBaseUrl = readConfig('ANDROID_AUTH_BROKER_BASE_URL', '')
def authUseEmulator = asBoolean(readConfig('ANDROID_FIREBASE_AUTH_USE_EMULATOR', 'false'))
def authEmulatorHost = readConfig('ANDROID_FIREBASE_AUTH_EMULATOR_HOST', '10.0.2.2')
def authEmulatorPort = readConfig('ANDROID_FIREBASE_AUTH_EMULATOR_PORT', '9099')

android {
    namespace = "com.troesh.scalpstation"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig true
    }
    defaultConfig {
        applicationId "com.troesh.scalpstation"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        manifestPlaceholders = [
            socialAuthAppLinkHost: appLinkHost,
            socialAuthAppLinkPath: appLinkPath,
            appAuthRedirectScheme: defaultAppRedirectScheme
        ]

        buildConfigField 'String', 'SOCIAL_AUTH_FIREBASE_API_KEY', quote(firebaseApiKey)
        buildConfigField 'String', 'SOCIAL_AUTH_FIREBASE_APP_ID', quote(firebaseAppId)
        buildConfigField 'String', 'SOCIAL_AUTH_FIREBASE_PROJECT_ID', quote(firebaseProjectId)
        buildConfigField 'String', 'SOCIAL_AUTH_FIREBASE_MESSAGING_SENDER_ID', quote(firebaseSenderId)
        buildConfigField 'String', 'SOCIAL_AUTH_FIREBASE_STORAGE_BUCKET', quote(firebaseStorageBucket)
        buildConfigField 'String', 'SOCIAL_AUTH_GOOGLE_WEB_CLIENT_ID', quote(googleWebClientId)
        buildConfigField 'String', 'SOCIAL_AUTH_FACEBOOK_APP_ID', quote(facebookAppId)
        buildConfigField 'String', 'SOCIAL_AUTH_FACEBOOK_CLIENT_TOKEN', quote(facebookClientToken)
        buildConfigField 'String', 'SOCIAL_AUTH_BROKER_BASE_URL', quote(authBrokerBaseUrl)
        buildConfigField 'String', 'SOCIAL_AUTH_REDIRECT_URI', quote(configuredRedirectUri)
        buildConfigField 'boolean', 'SOCIAL_AUTH_USE_EMULATOR', authUseEmulator.toString()
        buildConfigField 'String', 'SOCIAL_AUTH_EMULATOR_HOST', quote(authEmulatorHost)
        buildConfigField 'int', 'SOCIAL_AUTH_EMULATOR_PORT', authEmulatorPort

        resValue 'string', 'default_web_client_id', quote(googleWebClientId)
        resValue 'string', 'facebook_app_id', quote(facebookAppId)
        resValue 'string', 'facebook_client_token', quote(facebookClientToken)
        resValue 'string', 'facebook_login_protocol_scheme', quote(facebookAppId ? "fb${facebookAppId}" : 'fb0')
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation platform('com.google.firebase:firebase-bom:34.13.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'androidx.credentials:credentials:1.3.0'
    implementation 'androidx.credentials:credentials-play-services-auth:1.3.0'
    implementation 'com.google.android.libraries.identity.googleid:googleid:1.1.1'
    implementation 'com.facebook.android:facebook-login:18.0.0'
    implementation 'net.openid:appauth:0.11.1'
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
